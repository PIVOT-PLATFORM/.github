name: Security (reusable)

# Reusable security workflow — source unique pour tous les repos de l'org.
# Consommé via un stub minimal dans chaque repo :
#
#   jobs:
#     security:
#       uses: PIVOT-PLATFORM/.github/.github/workflows/security.yml@v1
#       secrets: inherit
#       with: { ... }          # voir "inputs" ci-dessous ; défauts = famille -core (Java)
#
# Familles :
#   -core (Java)  : défauts tels quels (codeql-language java, build Maven, semgrep Java/Spring).
#   -ui  (Node)   : passer codeql-language=javascript, java-version='' (autobuild CodeQL),
#                   semgrep-flags JS/TS, semgrep-paths=src.
#
# Auto-contenu : n'utilise AUCUNE composite action locale au repo appelant (setup Java inliné),
# pour qu'aucun repo module ne dépende du CI d'un autre.

on:
  workflow_call:
    inputs:
      codeql-language:
        description: "Langage CodeQL : java | javascript | ..."
        type: string
        default: java
      codeql-config-file:
        description: "Chemin du fichier de config CodeQL dans le repo appelant."
        type: string
        default: .github/codeql/config.yml
      java-version:
        description: "Version Java (Temurin) pour le build CodeQL. Vide = pas de setup Java (repos Node)."
        type: string
        default: '25'
      codeql-build-command:
        description: "Commande de build avant analyse CodeQL. Vide = autobuild CodeQL (repos Node)."
        type: string
        default: 'mvn --no-transfer-progress compile -DskipTests'
      semgrep-flags:
        description: "Flags Semgrep (un par ligne : --config p/..., --exclude-rule ...)."
        type: string
        default: |
          --config p/java
          --config p/spring
          --config p/owasp-top-ten
          --config p/security-audit
          --config p/jwt
          --config p/sql-injection
          --config p/command-injection
          --config p/secrets
          --exclude-rule java.spring.security.audit.spring-csrf-disabled
      semgrep-paths:
        description: "Chemins scannés par Semgrep (séparés par des espaces)."
        type: string
        default: 'src/main/java src/test/java'
      gitleaks-config:
        description: "Chemin de la config Gitleaks dans le repo appelant."
        type: string
        default: .github/workflows/configuration/.gitleaks.toml
      plumber-threshold:
        description: "Seuil de compliance Plumber (gate bloquant)."
        type: number
        default: 90
    # Secrets déclarés explicitement (JAMAIS `secrets: inherit` côté appelant — interdit par le
    # contrôle Plumber reusableWorkflowsMustNotInheritSecrets). Tous optionnels : un secret absent
    # côté appelant est passé vide, le job dégrade proprement (gitleaks sans licence, etc.).
    secrets:
      GITLEAKS_LICENCE_KEY:
        required: false
      SEMGREP_APP_TOKEN:
        required: false
      PLUMBER_METADATA_TOKEN:
        required: false
      PLUMBER_TOKEN:
        required: false

# Le bloc workflow-level d'un reusable est validé par GitHub contre le plafond de
# permissions accordé par l'appelant (stub `uses: .../security.yml@...`), PAS contre
# les scopes disponibles sur le repo. `read-all` demande ici artifact-metadata,
# attestations, checks, id-token, etc. — un plafond que les stubs appelants
# n'accordent pas (ils donnent contents: read, actions: read, security-events:
# write), d'où le `startup_failure` "workflow is requesting ... but is only
# allowed ...". On aligne donc ce bloc sur l'union exacte des permissions
# déclarées par les 4 jobs ci-dessous (gitleaks, codeql, semgrep, plumber) :
# contents: read, actions: read (codeql), security-events: write.
permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  # -----------------------------------------
  # SECRETS — Gitleaks
  # -----------------------------------------
  gitleaks:
    name: Gitleaks - Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENCE_KEY }}
          GITLEAKS_CONFIG: ${{ inputs.gitleaks-config }}

  # -----------------------------------------
  # SAST — CodeQL
  # -----------------------------------------
  codeql:
    name: CodeQL - SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Setup Java inliné (auto-contenu) — désactivé pour les repos Node (java-version vide).
      - name: Setup Java (Temurin)
        if: inputs.java-version != ''
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      - name: Cache Maven dependencies
        if: inputs.java-version != ''
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-security-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-security-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ inputs.codeql-language }}
          config-file: ${{ inputs.codeql-config-file }}

      - name: Build
        if: inputs.codeql-build-command != ''
        run: ${{ inputs.codeql-build-command }}
        env:
          # Résout fr.pivot:pivot-*-starter (GitHub Packages, lecture authentifiée) via le
          # .mvn/settings.xml committé du repo appelant. Sans effet pour les repos Node.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4

  # -----------------------------------------
  # SAST — Semgrep
  # -----------------------------------------
  semgrep:
    name: Semgrep - SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # requis par upload-sarif (sinon "Resource not accessible by integration")

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python (Semgrep CLI)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep Scan
        run: |
          # Les flags multi-lignes (inputs.semgrep-flags) sont injectés via un heredoc quoté
          # puis word-splittés — évite les problèmes de continuation de ligne dans le run.
          SEMGREP_FLAGS=$(cat <<'PIVOT_SEMGREP_EOF'
          ${{ inputs.semgrep-flags }}
          PIVOT_SEMGREP_EOF
          )
          # shellcheck disable=SC2086  # word-splitting intentionnel sur $SEMGREP_FLAGS / paths
          semgrep scan \
            $SEMGREP_FLAGS \
            --sarif --output semgrep-results.sarif \
            ${{ inputs.semgrep-paths }} || true
          FINDINGS=$(jq '.runs[0].results | length' semgrep-results.sarif)
          echo "Semgrep findings (non-suppressed): $FINDINGS"
          if [ "$FINDINGS" -gt 0 ]; then
            jq -r '.runs[0].results[] | "[\(.ruleId)] \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // "?") -- \(.message.text[0:300])"' semgrep-results.sarif
            exit 1
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('semgrep-results.sarif') != ''
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-sast

  # -----------------------------------------
  # CI/CD CONFORMITE — Plumber
  # -----------------------------------------
  # Job id MUST stay "plumber": GitHub code scanning derives the analysis configuration
  # from "<workflow>:<job_id>". Renaming it breaks the diff against the baseline on main.
  plumber:
    name: Plumber - CI/CD Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Plumber
        uses: getplumber/plumber@a0658c7fbd82163d75803cce492d18e50ef71afd # v0.3.68
        with:
          sarif: plumber-results.sarif
          output: plumber-results.json
          pbom-cyclonedx: plumber-pbom.cdx.json
          threshold: ${{ inputs.plumber-threshold }}
          # Token lecture public-repo pour résoudre les versions d'actions tierces
          # (l'org PIVOT-PLATFORM a une IP allow list qui bloque sinon, 403). Optionnel.
          metadata-token: ${{ secrets.PLUMBER_METADATA_TOKEN }}
        env:
          # PAT Administration:read → Plumber lit la branch protection (branchMustBeProtected).
          # Fallback sur GITHUB_TOKEN si absent (le contrôle devient faux négatif, mais le job tourne).
          GITHUB_TOKEN: ${{ secrets.PLUMBER_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload Plumber SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('plumber-results.sarif') != ''
        with:
          sarif_file: plumber-results.sarif
          category: plumber-supply-chain

      - name: Upload Plumber artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always() && hashFiles('plumber-results.json') != ''
        with:
          name: plumber-report
          path: |
            plumber-results.json
            plumber-pbom.cdx.json

      - name: Plumber Gate (conformite >= seuil requise)
        if: hashFiles('plumber-results.json') != ''
        run: |
          SCORE=$(jq '.compliance' plumber-results.json)
          THRESHOLD=${{ inputs.plumber-threshold }}
          echo "Plumber compliance: ${SCORE}% (seuil ${THRESHOLD}%)"
          if [ "$SCORE" -lt "$THRESHOLD" ]; then
            echo "::error::Plumber compliance ${SCORE}% < ${THRESHOLD}%% (security gate)"
            exit 1
          fi
